<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prefeitura - Denúncia de Lixo</title>
<link rel="stylesheet" href="style.css">


<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>


<header>
  <h1>Prefeitura Municipal</h1>
  <p>Portal de Denúncias Urbanas</p>
</header>


<div class="container">
  <h2>Denunciar excesso de lixo</h2>
  <form id="denunciaForm">
    <label>Rua:</label>
    <input type="text" placeholder="Digite o nome da rua" required>


    <label>Descrição da denúncia:</label>
    <textarea placeholder="Descreva o problema..." required></textarea>


    <label>Foto(s) do local:</label>
    <input type="file" id="fotos" multiple accept="image/*">


    <label>Local no mapa:</label>
    <div id="map" style="height:300px;"></div>


    <button type="submit">Enviar denúncia</button>
  </form>


  <div class="preview" id="preview"></div>
</div>


<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<!-- Firebase JS -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
<script src="script.js"></script>


</body>
</html>
